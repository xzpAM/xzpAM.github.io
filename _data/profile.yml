short_bio: >-
 <p>
    Hi, my name is Zhipeng Xie. Welcome to my homepage. I received my bachelor's degree
    from Shanghai Maritime University. During the fourth year of my undergraduate study,
    I worked as a research assistant at Zhejiang University for one year, where I gained
    research experience in AI agent and Robotics Learning.
    Currently, I am a master's student at East China Normal University, advised by Jing Zhao. My research
    interests include robotics, Embodied AI, Multimodal Large Language Model, and World Action Model. I am particularly interested in building intelligent
    agents and robotic systems that can perceive, reason, and act in complex
    real-world environments. Welcome to reach out to me for communication and collaboration!
  </p>
